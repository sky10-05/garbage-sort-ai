<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>自治体選択 - AIごみ分別案内</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="app-shell">
        <header class="page-header">
            <p class="eyebrow">Eco Sorting Assistant</p>
            <h1>AIごみ分別案内システム</h1>
        </header>

        <section class="panel">
            <h2>お住まいの自治体を選んでください</h2>
            <p class="lead-text">地域のルールに合わせて、迷いやすいごみの出し方をやさしく案内します。</p>
            <form method="post" class="form-stack">
                <label for="municipality_id">自治体</label>
                <select id="municipality_id" name="municipality_id" required>
                    <option value="">選択してください</option>
                    {% for municipality in municipalities %}
                    <option value="{{ municipality.municipality_id }}">
                        {{ municipality.prefecture_name }} {{ municipality.municipality_name }}
                    </option>
                    {% endfor %}
                </select>

                <label class="check-row">
                    <input type="checkbox" name="voice_enabled" value="on" checked>
                    結果画面で音声案内ボタンを表示する
                </label>

                <button type="submit" class="primary-button">この自治体で始める</button>
            </form>
            <p class="hint">選択内容はセッション内のみ保持されます。画面を閉じたら次回は選び直します。</p>
        </section>
    </main>
</body>
</html>
